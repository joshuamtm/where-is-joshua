<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Wandering Jew (Tradescantia zebrina) leaf: green body with the
       signature magenta central vein and two faint silver stripes -->
  <path d="M 16 2 C 25 9, 25 23, 16 30 C 7 23, 7 9, 16 2 Z" fill="#5a8b4f"/>
  <path d="M 11 10 Q 11 16, 11 22" stroke="#cfdbc8" stroke-width="1.3" stroke-linecap="round" fill="none"/>
  <path d="M 21 10 Q 21 16, 21 22" stroke="#cfdbc8" stroke-width="1.3" stroke-linecap="round" fill="none"/>
  <line x1="16" y1="6" x2="16" y2="26" stroke="#e91e63" stroke-width="2.5" stroke-linecap="round"/>
</svg>
